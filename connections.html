<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ecefe4" />
  <title>DinoConnections — group the dinosaurs</title>
  <meta name="description" content="Find the four tiles that belong to each dinosaur — image, name and facts — until every tile is grouped." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260709070609" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" />
  <script src="js/theme.js?v=20260709070609"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html"><span class="logo">🦕</span> Dino<b>Trivia</b></a>
      <span class="tb-actions">
        <button class="iconbtn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
        <a class="iconbtn" href="index.html" title="Menu">🏠</a>
      </span>
    </div>

    <!-- mode select -->
    <div id="mode-select">
      <div class="hero" style="padding-bottom:0">
        <h1 style="font-size:30px">🔗 DinoConnections</h1>
        <p>Every dinosaur has <b>4 tiles</b> — its picture, its name and two facts. Find all four groups.</p>
      </div>
      <div class="modecard">
        <h2>Choose a mode</h2>
        <p>Select four tiles you think belong to the same dinosaur, then Submit. Four mistakes allowed.</p>
        <button class="bigbtn daily" id="btn-daily">Daily Puzzle
          <small>same for everyone today · shareable</small></button>
        <button class="bigbtn endless" id="btn-practice">Practice
          <small>a fresh random puzzle every time</small></button>
      </div>
      <div class="footer"><a href="credits.html">Image credits</a></div>
    </div>

    <!-- game -->
    <div id="game" class="hidden">
      <div class="scorebar">
        <span class="pill" id="mode-pill">Daily</span>
        <span class="pill">Mistakes left: <b id="lives">4</b></span>
      </div>
      <div id="solved"></div>
      <div id="grid" class="cgrid"></div>
      <div class="cbtns">
        <button class="cbtn ghost" id="shuffle">Shuffle</button>
        <button class="cbtn ghost" id="deselect">Deselect all</button>
        <button class="cbtn solid" id="submit" disabled>Submit</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden"><div class="sheet" id="sheet"></div></div>

  <script src="js/engine.js?v=20260709070609"></script>
  <script src="js/connections.js?v=20260709070609"></script>
</body>
</html>
