<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ecefe4" />
  <title>DinoWithWhom — which period did they live in?</title>
  <meta name="description" content="A geological period is chosen — Triassic, Jurassic or Cretaceous. Find the dinosaurs that lived in it. Five wrong guesses and you're out." />
  <link rel="stylesheet" href="css/style.css?v=20260713134819" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>" />
  <script src="js/theme.js?v=20260713134819"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html"><span class="logo">🦕</span> Dino<b>Trivia</b></a>
      <span class="tb-actions">
        <button class="iconbtn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
        <a class="iconbtn" href="index.html" title="Menu">🏠</a>
      </span>
    </div>

    <!-- mode select -->
    <div id="mode-select">
      <div class="hero" style="padding-bottom:0">
        <h1 style="font-size:30px">⏳ DinoWithWhom</h1>
        <p>A period is chosen — <b>Triassic</b>, <b>Jurassic</b> or <b>Cretaceous</b>. Find the dinosaurs that lived in it.</p>
      </div>
      <div class="modecard">
        <h2>Choose a mode</h2>
        <p>Tap the dinosaurs you think are from the named period. Five wrong guesses allowed.</p>
        <button class="bigbtn daily" id="btn-daily">Daily Puzzle
          <small>same for everyone today · shareable</small></button>
        <button class="bigbtn endless" id="btn-practice">Practice
          <small>a fresh random puzzle every time</small></button>
      </div>
      <div class="footer"><a href="credits.html">Image credits</a></div>
    </div>

    <!-- game -->
    <div id="game" class="hidden">
      <div class="scorebar">
        <span class="pill" id="mode-pill">Daily</span>
        <span class="pill">Found: <b id="found">0</b>/<b id="find-total">0</b></span>
        <span class="pill">Guesses left: <b id="lives">5</b></span>
      </div>
      <div class="wfind" id="wfind"></div>
      <div id="grid" class="cgrid"></div>
      <div id="legend"></div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden"><div class="sheet" id="sheet"></div></div>

  <script src="js/engine.js?v=20260713134819"></script>
  <script src="js/whowith.js?v=20260713134819"></script>
</body>
</html>
